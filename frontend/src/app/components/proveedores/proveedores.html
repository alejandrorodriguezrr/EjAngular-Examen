<div>
    <h3>Añadir proveedor</h3>
    <input type="text" [(ngModel)]="proveedor.nombre" placeholder="nombre">
    <input type="text" [(ngModel)]="proveedor.ciudad" placeholder="ciudad">
    <input type="text" [(ngModel)]="proveedor.pais" placeholder="pais">
    <button (click)="guardar()">GUARDAR PROVEEDOR</button>
</div>
